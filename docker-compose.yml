version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: makodev-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: makoDev
    ports:
      - "5433:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  app:
    build: .
    container_name: makodev-app
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: makoDev
      PGUSER: postgres
      PGPASSWORD: rootpassword
      INVITE_CODE: admin
    restart: unless-stopped

volumes:
  pgdata: